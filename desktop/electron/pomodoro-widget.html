  <title>덤핏 뽀모도로</title>
  <style>
    /* 웹 리디자인과 동일한 레트로 우주 토큰 (frontend/src/index.css 참조) */

      --bg: #F7EFDF; --card: #FFFDF6; --fg: #33271E; --sub: #8C7C66;
      --line: #E0D2B6; --edge: #3A2C21; --chip: #F0DFBB;
      --accent: #D95F52; --accent2: #C98A2D; --on-accent: #FFFBF0;
      --shadow-sm: #DCC5A0;
    }

        --line: #413966; --edge: #141021; --chip: #3A3156;
        --accent: #F09355; --accent2: #E9B44C; --on-accent: #241E14;

      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }

    .px { font-family: 'DGM', monospace; -webkit-font-smoothing: none; }

    .widget {
      width: 100%;
      height: 100%;
      border: 1.5px solid var(--edge);
      border-radius: 12px;
      background: var(--bg);
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      -webkit-app-region: drag;
    }

    .title {
      width: 100%;
      border-bottom: 2px dotted var(--accent2);
      padding-bottom: 8px;
      color: var(--sub);
      font-family: 'DGM', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      -webkit-app-region: no-drag;
    }

    .mode {
      min-width: 54px;
      height: 23px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--edge);
      border-radius: 999px;
      background: var(--accent);
      color: var(--on-accent);
      font-family: 'DGM', monospace;
      font-size: 10px;
      letter-spacing: 0;
    }

    .icon-button {
      width: 25px;
      height: 25px;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: var(--card);
      color: var(--sub);
      font-size: 13px;
      font-weight: 950;
      line-height: 1;
      cursor: pointer;
    }

    #open {
      padding-bottom: 2px;
    }

    .icon-button:hover {
      background: var(--chip);
      color: var(--fg);
    }

    #close:hover {
      background: var(--accent);
      color: var(--on-accent);
    }

    .timer {
      position: relative;
      width: 112px;
      height: 112px;
      margin-top: 2px;
    }

    .timer svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer circle {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
    }

    .track {
      stroke: var(--line);
    }

    .progress {
      stroke: var(--accent);
      stroke-dasharray: 263.89;
      stroke-dashoffset: 263.89;
      transition: stroke-dashoffset 0.4s linear, stroke 0.2s ease;
    }

    .time {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: 'DGM', monospace;
      -webkit-font-smoothing: none;
      font-size: 20px;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .task {
      width: 100%;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--card);
      padding: 0 8px;
      font-size: 10px;
      font-weight: 850;
      color: var(--fg);
      -webkit-app-region: no-drag;
      cursor: pointer;
    }

    .task:focus {
      outline: 2px solid var(--accent2);
      outline-offset: 1px;
    }

    .controls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 58px;
      gap: 7px;
      -webkit-app-region: no-drag;
    }

    .action {
      height: 34px;
      border: 1.5px solid var(--edge);
      border-radius: 7px;
      font-size: 11px;
      font-weight: 950;
      color: var(--fg);
      background: var(--card);
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--shadow-sm);
      transition: transform .08s ease, box-shadow .08s ease;
    }

    .action.primary {
      background: var(--accent);
      color: var(--on-accent);
    }

    .action:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--shadow-sm);
    }

    .action:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--shadow-sm);
    }

    body.break .mode,
    body.break .action.primary {
      background: var(--accent2);
      color: var(--on-accent);
    }

    body.break .progress {
      stroke: var(--accent2);
    }

    body.idle .mode {
      background: var(--chip);
      color: var(--sub);
    }

    body.idle .progress {
      stroke: var(--line);
    }

    body.idle .action.primary {
      background: var(--accent);
    }

    @media (prefers-reduced-motion: reduce) {
      .action, .progress { transition: none; }
    }
  </style>
</head>
<body class="idle">
  <main class="widget">
    <div class="title">POMODORO</div>

    <div class="top">
      <div class="mode" id="mode">FOCUS</div>
      <button class="icon-button" id="open" type="button" title="덤핏 열기" aria-label="덤핏 열기">↗</button>
      <button class="icon-button" id="close" type="button" title="닫기" aria-label="닫기">×</button>
    </div>

    <section class="timer" aria-label="뽀모도로 타이머">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle class="track" cx="50" cy="50" r="42" />
        <circle class="progress" id="progress" cx="50" cy="50" r="42" />
      </svg>
      <div class="time" id="time">--:--</div>
    </section>

    <select class="task" id="task" aria-label="집중할 태스크 선택">
      <option value="">집중할 태스크 선택</option>
    </select>

    <div class="controls">
      <button class="action primary" id="openAction" type="button">집중시작</button>
      <button class="action" id="resetAction" type="button">초기화</button>
    </div>
  </main>
</body>
</html>
