name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build backend jar
        working-directory: backend
        run: chmod +x gradlew && ./gradlew bootJar -x test --no-daemon

      - name: Prepare EC2 workspace
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            cd ~/dumpit
            git fetch origin main
            git checkout main
            git pull origin main
            mkdir -p backend/build/libs
            rm -f backend/build/libs/*.jar

      - name: Upload backend artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend/build/libs/*.jar"
          target: "~/dumpit/backend/build/libs"
          strip_components: 3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/dumpit
            JAR_PATH=$(find backend/build/libs -maxdepth 1 -type f -name "*.jar" ! -name "app.jar" | head -n 1)
            cp "$JAR_PATH" backend/build/libs/app.jar
            sudo docker-compose down
            sudo docker-compose up -d --build
