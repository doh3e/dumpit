name: Desktop Build

on:
  push:
    branches: [desktop]
    paths:
      - 'desktop/**'
      - 'frontend/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [desktop]
    paths:
      - 'desktop/**'
      - 'frontend/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

jobs:
  desktop:
    name: Desktop Package Check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend for desktop
        working-directory: desktop
        env:
          VITE_API_URL: https://api.dumpit.kr/api
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: ${{ secrets.VITE_SENTRY_ENVIRONMENT }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ secrets.VITE_SENTRY_TRACES_SAMPLE_RATE }}
          VITE_SENTRY_SEND_DEFAULT_PII: ${{ secrets.VITE_SENTRY_SEND_DEFAULT_PII }}
        run: npm run build:frontend

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Package desktop app
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never
