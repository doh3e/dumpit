spring:
  application:
    name: dumpit

  profiles:
    active: local

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "1"
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 1s
      repositories:
        enabled: false

  session:
    store-type: ${SPRING_SESSION_STORE_TYPE:none}
    redis:
      namespace: ${SPRING_SESSION_REDIS_NAMESPACE:dumpit:session}

  security:
    oauth2:
      client:
        registration:
          google:
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/calendar.readonly

server:
  port: 8080
  servlet:
    context-path: /api
    session:
      timeout: 24h
      cookie:
        http-only: true
        same-site: lax
        secure: false

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini

mail:
  resend:
    api-key: ${RESEND_API_KEY}
  from: ${MAIL_FROM}
  admin-notification: ${ADMIN_NOTIFICATION_EMAIL}

app:
  frontend-url: http://localhost:5173
  cors:
    allowed-origins: http://localhost:5173
  retention:
    withdrawn-activity-log-days: ${WITHDRAWN_ACTIVITY_LOG_RETENTION_DAYS:90}
    withdrawn-ai-usage-log-days: ${WITHDRAWN_AI_USAGE_LOG_RETENTION_DAYS:180}
    cleanup-cron: ${LOG_RETENTION_CLEANUP_CRON:0 30 3 * * *}

sentry:
  dsn: ${SENTRY_DSN:}
  debug: ${SENTRY_DEBUG:false}
  environment: ${SENTRY_ENVIRONMENT:${spring.profiles.active:local}}
  exception-resolver-order: ${SENTRY_EXCEPTION_RESOLVER_ORDER:-2147483647}
  max-request-body-size: ${SENTRY_MAX_REQUEST_BODY_SIZE:small}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  send-default-pii: ${SENTRY_SEND_DEFAULT_PII:false}

logging:
  level:
    org.springframework.security: INFO
