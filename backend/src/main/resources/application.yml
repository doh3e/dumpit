spring:
  application:
    name: dumpit

  profiles:
    active: local

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 1s

  security:
    oauth2:
      client:
        registration:
          google:
            scope:
              - email
              - profile
              - https://www.googleapis.com/auth/calendar

server:
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: false

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini

mail:
  resend:
    api-key: ${RESEND_API_KEY}
  from: ${MAIL_FROM}
  admin-notification: ${ADMIN_NOTIFICATION_EMAIL}

app:
  frontend-url: http://localhost:5173
  cors:
    allowed-origins: http://localhost:5173

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:${spring.profiles.active:local}}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  send-default-pii: false

logging:
  level:
    org.springframework.security: INFO
